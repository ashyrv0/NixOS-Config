[general]
live_config_reload = true
import = ["~/.cache/matugen/colors.toml", "~/.config/alacritty/fonts.toml"]

[terminal]
shell.program = "/run/current-system/sw/bin/fish"

[window]
decorations = "none"
opacity = 0.9

[cursor]
blink_interval = 550
unfocused_hollow = false
thickness = 0.15

[cursor.style]
blinking = "On"
shape = "Beam"